name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: bun install
        working-directory: packages/server

      - run: npm install
        working-directory: packages/desktop

      - run: npm run check

      - run: bun test
        working-directory: packages/server
